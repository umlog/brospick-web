                      - strong [ref=e156]: 슬라이딩 태클·축구화 간 접촉
                      - text: ","
                      - strong [ref=e157]: 인조잔디 마찰
                      - text: ","
                      - strong [ref=e158]: 스터드 자국과 스크래치
                      - text: ","
