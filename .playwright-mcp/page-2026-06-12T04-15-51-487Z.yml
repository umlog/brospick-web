                  - generic [ref=e120]:
                    - paragraph [ref=e121]: Q. BOOT SKIN은 일반 스티커나 열전사 필름과 어떻게 다른가요?
                    - paragraph [ref=e122]:
                      - text: 일반 비닐 스티커는 두껍고 쉽게 들뜨거나 벗겨질 수 있으며, 열전사 필름은 열프레스 장비가 필요합니다. 반면 Boot Skin은
                      - strong [ref=e123]: 국내 고급 잉크와 접착 기술
                      - text: 을 사용한 기계로 생산하여 축구화 표면에 자연스럽게 밀착됩니다.
                      - strong [ref=e124]: 두꺼운 가장자리가 없어
                      - text: 걸리거나 들뜰 가능성이 적고,
                      - strong [ref=e125]: 별도의 열 작업 없이
                      - text: 집에서도 쉽게 부착할 수 있습니다.
                  - generic [ref=e126]:
                    - paragraph [ref=e127]: Q. 방수와 날씨 변화에 강한가요?
                    - paragraph [ref=e128]:
                      - text: 네. Boot Skin은 다양한 환경에서도 안정적으로 유지됩니다. 비나 젖은 환경에서
                      - strong [ref=e129]: 완전 방수
                      - text: ", 직사광선에도 색이 쉽게 바래지 않는"
                      - strong [ref=e130]: 자외선 저항
                      - text: ","
                      - strong [ref=e131]: 영하 10°C ~ 영상 60°C 온도 안정성
                      - text: ", 마찰과 흠집을 줄여주는"
                      - strong [ref=e132]: 보호 코팅
                      - text: ", 진흙도 디자인 손상 없이 쉽게 닦아낼 수 있습니다."
                  - generic [ref=e133]:
                    - paragraph [ref=e134]: Q. 어떤 축구화 브랜드와 소재에 사용할 수 있나요?
                    - paragraph [ref=e135]:
                      - strong [ref=e136]: Nike, Adidas, Puma 등 모든 브랜드
                      - text: 의 축구화에 사용 가능하며,
                      - strong [ref=e137]: 천연 가죽과 합성 가죽 소재 모두
                      - text: 에 적용할 수 있습니다. Boot Skin의 접착 기술은 축구화 표면에 안정적으로 부착되도록 설계되었습니다.
                  - generic [ref=e138]:
                    - paragraph [ref=e139]: Q. 어떤 사이즈가 있나요?
                    - paragraph [ref=e140]:
                      - text: Boot Skin은
                      - strong [ref=e141]: 5mm와 10mm
                      - text: 높이의 전사 제품을 제공합니다. 각 제품 페이지의 옵션 이미지를 확인하시면 정확한 크기를 확인하실 수 있습니다.
                  - generic [ref=e142]:
                    - paragraph [ref=e143]: Q. 부착 후 바로 경기해도 되나요?
                    - paragraph [ref=e144]:
                      - text: 바로 사용할 수는 있지만, 최대 접착력을 위해
                      - strong [ref=e145]: 1~2시간 경화 시간
                      - text: 을 권장합니다. 가장 좋은 결과를 위해
                      - strong [ref=e146]: 경기 전날 부착
                      - text: 하는 것을 추천합니다.
                  - generic [ref=e147]:
                    - paragraph [ref=e148]: Q. 얼마나 오래 지속되나요?
                    - paragraph [ref=e149]:
                      - text: 올바르게 부착된 Boot Skin은 정기적인 플레이 기준
                      - strong [ref=e150]: 여러 시즌
                      - text: ","
                      - strong [ref=e151]: 200시간 이상
                      - text: 의 경기 사용,
                      - strong [ref=e152]: 300회 이상
                      - text: 의 훈련 세션을 견딜 수 있습니다. 저가형 제품과는 다른 내구성을 제공합니다.
                  - generic [ref=e153]:
                    - paragraph [ref=e154]: Q. 경기 중 손상되면 어떻게 되나요?
                    - paragraph [ref=e155]:
