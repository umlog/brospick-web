            - paragraph [ref=e226]: 지금도 많은 선수들이 에이전트 사기, 터무니없는 해외 테스트 비용, 미국 대학 에이전시 비용 등으로 수백만 원에서 수천만 원까지 지출하고 있습니다. 이 책은 그런 어지러운 정보 속에서 실제 사례를 바탕으로 방향을 잡을 수 있도록 만든 자료입니다. 단순한 정보값이 아니라, 잘못된 선택과 불필요한 시행착오 비용을 줄이기 위한 금액입니다. 해외 진출을 진지하게 고민하는 선수라면, 먼저 알고 움직이는 것이 훨씬 중요합니다. 운동부 한달 회비의 절반도 되지 않는 금액으로 많은 것들을 알게 될 것입니다.
