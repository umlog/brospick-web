                  - generic [ref=e102]:
                    - paragraph [ref=e103]: Q. BOOT SKIN은 일반 스티커나 열전사 필름과 어떻게 다른가요?
                    - paragraph [ref=e104]:
                      - text: 일반 비닐 스티커는 두껍고 쉽게 들뜨거나 벗겨질 수 있으며, 열전사 필름은 열프레스 장비가 필요합니다. 반면 Boot Skin은
                      - strong [ref=e105]: 국내 고급 잉크와 접착 기술
                      - text: 을 사용한 기계로 생산하여 축구화 표면에 자연스럽게 밀착됩니다.
                      - strong [ref=e106]: 두꺼운 가장자리가 없어
                      - text: 걸리거나 들뜰 가능성이 적고,
                      - strong [ref=e107]: 별도의 열 작업 없이
                      - text: 집에서도 쉽게 부착할 수 있습니다.
                  - generic [ref=e108]:
                    - paragraph [ref=e109]: Q. 방수와 날씨 변화에 강한가요?
                    - paragraph [ref=e110]:
                      - text: 네. Boot Skin은 다양한 환경에서도 안정적으로 유지됩니다. 비나 젖은 환경에서
                      - strong [ref=e111]: 완전 방수
                      - text: ", 직사광선에도 색이 쉽게 바래지 않는"
                      - strong [ref=e112]: 자외선 저항
                      - text: ","
                      - strong [ref=e113]: 영하 10°C ~ 영상 60°C 온도 안정성
                      - text: ", 마찰과 흠집을 줄여주는"
                      - strong [ref=e114]: 보호 코팅
                      - text: ", 진흙도 디자인 손상 없이 쉽게 닦아낼 수 있습니다."
                  - generic [ref=e115]:
                    - paragraph [ref=e116]: Q. 어떤 축구화 브랜드와 소재에 사용할 수 있나요?
                    - paragraph [ref=e117]:
                      - strong [ref=e118]: Nike, Adidas, Puma 등 모든 브랜드
                      - text: 의 축구화에 사용 가능하며,
                      - strong [ref=e119]: 천연 가죽과 합성 가죽 소재 모두
                      - text: 에 적용할 수 있습니다. Boot Skin의 접착 기술은 축구화 표면에 안정적으로 부착되도록 설계되었습니다.
                  - generic [ref=e120]:
